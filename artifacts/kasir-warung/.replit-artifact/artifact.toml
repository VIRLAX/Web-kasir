kind = "web"
previewPath = "/"
title = "Kasir Warung"
version = "1.0.0"
id = "artifacts/kasir-warung"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26005

[services.development]
run = "pnpm --filter @workspace/kasir-warung run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kasir-warung", "run", "build" ]
publicDir = "artifacts/kasir-warung/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26005"
BASE_PATH = "/"
